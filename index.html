<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>文件列表</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f7fa;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 32px 28px;
            max-width: 720px;
            width: 100%;
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            color: #1a2332;
            margin-bottom: 6px;
        }
        .sub {
            color: #6b7a8f;
            font-size: 14px;
            margin-bottom: 24px;
            border-bottom: 1px solid #eef2f6;
            padding-bottom: 16px;
        }
        .file-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .file-item {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            border-radius: 10px;
            transition: background 0.15s;
            text-decoration: none;
            color: #1a2332;
        }
        .file-item:hover {
            background: #f0f4fe;
        }
        .file-icon {
            font-size: 18px;
            margin-right: 14px;
            opacity: 0.7;
            width: 24px;
            text-align: center;
        }
        .file-name {
            font-size: 15px;
            font-weight: 500;
            flex: 1;
            word-break: break-all;
        }
        .file-size {
            font-size: 13px;
            color: #8b9aaf;
            margin-left: 12px;
            white-space: nowrap;
        }
        .download-badge {
            font-size: 13px;
            color: #3b6eff;
            margin-left: 10px;
            font-weight: 500;
        }
        .empty {
            text-align: center;
            padding: 40px 0;
            color: #8b9aaf;
        }
        .loading {
            text-align: center;
            padding: 40px 0;
            color: #6b7a8f;
        }
        .footer {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #eef2f6;
            font-size: 13px;
            color: #8b9aaf;
            text-align: center;
        }
        @media (max-width: 480px) {
            .container { padding: 20px 16px; }
            .file-item { padding: 8px 10px; }
            .file-size { display: none; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📁 文件列表</h1>
    <div class="sub">点击文件名即可下载</div>
    <div class="file-list" id="fileList">
        <div class="loading">⏳ 加载中...</div>
    </div>
    <div class="footer">由 Cloudflare Pages 驱动</div>
</div>
<script>
    const REPO = "ksbeisheng02/ksbeisheng02.github.io";
    const FOLDER = "";
    const BRANCH = "master";

    const fileListEl = document.getElementById("fileList");

    async function fetchFiles() {
        const apiUrl = `https://api.github.com/repos/${REPO}/contents/${FOLDER}?ref=${BRANCH}`;

        try {
            const resp = await fetch(apiUrl);

            if (!resp.ok) {
                if (resp.status === 404) {
                    throw new Error("仓库或目录不存在，请检查 REPO 和 FOLDER 配置是否正确");
                }
                if (resp.status === 403) {
                    throw new Error("API 访问受限（可能达到频率限制），请稍后再试");
                }
                throw new Error(`请求失败 (HTTP ${resp.status})`);
            }

            const data = await resp.json();

            if (!Array.isArray(data)) {
                throw new Error("返回的数据格式异常");
            }

            const files = data.filter(item => item.type === "file");

            if (files.length === 0) {
                fileListEl.innerHTML = `<div class="empty">📭 当前目录下没有文件</div>`;
                return;
            }

            files.sort((a, b) => a.name.localeCompare(b.name));

            let html = "";
            files.forEach(file => {
                const ext = file.name.split('.').pop().toLowerCase();
                let icon = "📄";
                if (["pdf"].includes(ext)) icon = "📕";
                else if (["zip", "rar", "7z", "gz"].includes(ext)) icon = "📦";
                else if (["mp4", "avi", "mkv", "mov"].includes(ext)) icon = "🎬";
                else if (["mp3", "wav", "flac"].includes(ext)) icon = "🎵";
                else if (["exe", "msi", "dmg", "pkg"].includes(ext)) icon = "⚙️";
                else if (["txt", "log", "md"].includes(ext)) icon = "📃";
                else if (["jpg", "jpeg", "png", "gif", "webp", "svg"].includes(ext)) icon = "🖼️";
                else if (["doc", "docx"].includes(ext)) icon = "📘";
                else if (["xls", "xlsx"].includes(ext)) icon = "📊";
                else if (["ppt", "pptx"].includes(ext)) icon = "📙";

                const size = file.size;
                let sizeStr = "";
                if (size < 1024) sizeStr = size + " B";
                else if (size < 1024 * 1024) sizeStr = (size / 1024).toFixed(1) + " KB";
                else sizeStr = (size / 1024 / 1024).toFixed(1) + " MB";

                const downloadUrl = `https://raw.githubusercontent.com/${REPO}/${BRANCH}/${file.path}`;

                html += `
                    <a class="file-item" href="${downloadUrl}" download target="_blank">
                        <span class="file-icon">${icon}</span>
                        <span class="file-name">${file.name}</span>
                        <span class="file-size">${sizeStr}</span>
                        <span class="download-badge">⬇️</span>
                    </a>
                `;
            });

            fileListEl.innerHTML = html;
        } catch (error) {
            fileListEl.innerHTML = `<div class="empty">❌ ${error.message}</div>`;
            console.error("加载文件列表失败:", error);
        }
    }

    fetchFiles();
</script>
</body>
</html>
