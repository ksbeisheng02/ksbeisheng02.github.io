<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>文件站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Courier New", Courier, monospace;
            background: #b5a588;
            min-height: 100vh;
            padding: 12px;
            background-image: 
                repeating-linear-gradient(45deg, rgba(0,0,0,0.04) 0px, rgba(0,0,0,0.04) 1px, transparent 1px, transparent 4px);
        }
        .container {
            max-width: 820px;
            margin: 0 auto;
            background: #c4b59a;
            border: 3px solid #5a4a32;
            padding: 14px 12px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.15);
        }
        .header {
            border-bottom: 2px solid #5a4a32;
            padding-bottom: 6px;
            margin-bottom: 12px;
            font-size: 18px;
            font-weight: 700;
            color: #2d2418;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
        }
        .header span:last-child {
            font-weight: 400;
            font-size: 14px;
            color: #5a4a32;
        }
        .file-list {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 5px 6px;
            border-bottom: 1px dotted #8a7a62;
            text-decoration: none;
            color: #1a140e;
            font-size: 15px;
            transition: background 0.1s;
        }
        .file-item:hover {
            background: #b0a080;
        }
        .file-name {
            font-weight: 500;
            word-break: break-all;
            flex: 1;
            margin-right: 12px;
        }
        .download-btn {
            color: #1a140e;
            text-decoration: none;
            font-weight: 700;
            padding: 2px 12px;
            border: 2px solid #3d3224;
            background: #b5a080;
            font-size: 13px;
            letter-spacing: 0.5px;
            white-space: nowrap;
            transition: 0.1s;
        }
        .download-btn:hover {
            background: #8a7a62;
            border-color: #1a140e;
        }
        .release-tag {
            font-size: 11px;
            color: #4a3a2a;
            margin-right: 10px;
            background: #8a7a62;
            padding: 0 8px;
            border: 1px solid #3d3224;
        }
        .empty, .loading {
            text-align: center;
            padding: 24px 0;
            color: #4a3a2a;
            font-size: 15px;
        }
        .footer {
            margin-top: 14px;
            padding-top: 8px;
            border-top: 2px solid #5a4a32;
            font-size: 12px;
            color: #4a3a2a;
            text-align: center;
            letter-spacing: 1px;
        }
        @media (max-width: 480px) {
            .container { padding: 8px 6px; }
            .file-item { flex-wrap: wrap; gap: 4px; }
            .file-name { font-size: 14px; }
            .download-btn { font-size: 12px; padding: 0 10px; }
            .release-tag { font-size: 10px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <span>📂 文件站</span>
        <span>v0.1</span>
    </div>
    <div id="downloadList">
        <div class="loading">⏳ 加载中</div>
    </div>
    <div class="footer">由 GitHub 部署驱动</div>
</div>
<script>
    const REPO = "ksbeisheng02/ksbeisheng02.github.io";
    const FOLDER = "";
    const listEl = document.getElementById("downloadList");

    function formatSize(bytes) {
        if (bytes < 1024) return bytes + " B";
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
        if (bytes < 1024 * 1024 * 1024) return (bytes / 1024 / 1024).toFixed(1) + " MB";
        return (bytes / 1024 / 1024 / 1024).toFixed(2) + " GB";
    }

    function renderItems(items) {
        if (items.length === 0) {
            listEl.innerHTML = `<div class="empty">📭 空</div>`;
            return;
        }
        let html = "";
        items.forEach(item => {
            const sizeStr = item.size ? formatSize(item.size) : "";
            html += `
                <div class="file-item">
                    <span class="file-name">${item.name}</span>
                    ${item.tag ? `<span class="release-tag">${item.tag}</span>` : ""}
                    <span style="color:#4a3a2a;font-size:13px;margin-right:10px;">${sizeStr}</span>
                    <a class="download-btn" href="${item.url}" download target="_blank">下载</a>
                </div>
            `;
        });
        listEl.innerHTML = html;
    }

    async function fetchAll() {
        const fileItems = [];
        let branch = "master";
        try {
            const repoResp = await fetch(`https://api.github.com/repos/${REPO}`);
            if (repoResp.ok) {
                const repoData = await repoResp.json();
                branch = repoData.default_branch;
            }
        } catch (e) {
            console.warn("获取默认分支失败，尝试 master");
        }

        try {
            const fileUrl = `https://api.github.com/repos/${REPO}/contents/${FOLDER}?ref=${branch}`;
            const fileResp = await fetch(fileUrl);
            if (fileResp.ok) {
                const data = await fileResp.json();
                if (Array.isArray(data)) {
                    data.filter(f => f.type === "file").forEach(f => {
                        fileItems.push({
                            name: f.name,
                            size: f.size,
                            url: `https://raw.githubusercontent.com/${REPO}/${branch}/${f.path}`,
                            tag: ""
                        });
                    });
                }
            }
        } catch (e) {
            console.warn("加载文件列表失败:", e);
        }

        try {
            const releaseUrl = `https://api.github.com/repos/${REPO}/releases`;
            const releaseResp = await fetch(releaseUrl);
            if (releaseResp.ok) {
                const releases = await releaseResp.json();
                releases.forEach(r => {
                    if (r.assets && r.assets.length > 0) {
                        r.assets.forEach(asset => {
                            fileItems.push({
                                name: asset.name,
                                size: asset.size,
                                url: asset.browser_download_url,
                                tag: r.tag_name
                            });
                        });
                    }
                });
            }
        } catch (e) {
            console.warn("加载 Releases 失败:", e);
        }

        if (fileItems.length === 0) {
            listEl.innerHTML = `<div class="empty">📭 空</div>`;
            return;
        }

        fileItems.sort((a, b) => a.name.localeCompare(b.name));
        renderItems(fileItems);
    }

    fetchAll();
</script>
</body>
</html>
